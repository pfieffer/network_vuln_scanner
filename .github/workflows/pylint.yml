name: Lint
on: [pull_request, push]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v3
        with:
          python-version: "3.14.4"
      - run: pip install pylint
      - run: pylint $(git ls-files '*.py') --output-format=colorized