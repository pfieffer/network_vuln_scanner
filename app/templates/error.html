{% extends "base.html" %}
{% block title %}Error — VulnScanner{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="bg-gray-800 rounded-xl border border-gray-700 p-8 text-center">
        <div class="text-6xl font-bold text-red-500 mb-4">{{ error_code }}</div>
        <h2 class="text-3xl font-bold text-white mb-4">{{ error_message }}</h2>
        
        {% if error_description %}
        <p class="text-gray-300 mb-8">{{ error_description }}</p>
        {% endif %}

        <div class="space-y-3">
            <a href="{{ url_for('scanner.dashboard') }}"
               class="inline-block px-6 py-3 bg-emerald-600 hover:bg-emerald-700 text-white font-bold rounded-lg transition">
                🏠 Back to Dashboard
            </a>
            <br>
            <a href="{{ url_for('auth.logout') }}"
               class="inline-block px-6 py-3 bg-gray-700 hover:bg-gray-600 text-white font-bold rounded-lg transition">
                🚪 Logout
            </a>
        </div>
    </div>
</div>
{% endblock %}
