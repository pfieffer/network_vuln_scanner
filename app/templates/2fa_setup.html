{% extends "base.html" %}
{% block public_content %}
<div class="min-h-screen flex items-center justify-center bg-gray-900">
    <div class="w-full max-w-lg bg-gray-800 rounded-2xl shadow-2xl p-8 border border-gray-700">
        <h1 class="text-3xl font-bold text-emerald-400 text-center mb-2">Setup 2FA</h1>
        <p class="text-gray-400 text-center mb-8">Scan the QR code with Google Authenticator or enter the secret manually</p>

        <div class="bg-gray-900 rounded-xl p-6 text-center mb-6">
            <img src="{{ qr_code }}" alt="QR Code" class="mx-auto mb-4 w-48 h-48">

            <div class="bg-gray-800 rounded-lg p-4">
                <p class="text-xs text-gray-400 mb-1">Or enter this code manually:</p>
                <p class="text-lg font-mono text-emerald-400 select-all">{{ secret }}</p>
            </div>
        </div>

        <form method="POST" action="{{ url_for('auth.enable_2fa') }}" class="space-y-4" hx-post="{{ url_for('auth.enable_2fa') }}" hx-target="#result" hx-swap="innerHTML">
            <div id="result"></div>

            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1">Verification Code</label>
                <input type="text" name="token" required maxlength="6" placeholder="Enter 6-digit code"
                       class="w-full px-4 py-3 bg-gray-700 border border-gray-600 rounded-lg text-white focus:ring-2 focus:ring-emerald-500 outline-none text-center text-2xl tracking-widest">
            </div>

            <button type="submit"
                    class="w-full py-3 bg-emerald-600 hover:bg-emerald-700 text-white font-semibold rounded-lg transition">
                Enable 2FA
            </button>
        </form>
    </div>
</div>
{% endblock %}
